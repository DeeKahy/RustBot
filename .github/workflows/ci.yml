name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # songbird's voice stack needs libopus (opus2/audiopus_sys, via pkg-config,
      # with a cmake fallback) at build time; the -play command uses ffmpeg at runtime.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopus-dev pkg-config cmake ffmpeg

      - name: Cache cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Build project
        run: cargo build --verbose

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      # Report advisories but don't fail the build on them: the remaining ones are
      # in transitive deps we don't control (e.g. rustls-webpki / aes-gcm panics
      # pulled via songbird's voice stack, and some unmaintained proc-macro crates).
      # Keep this visible so real, actionable advisories still get noticed.
      - name: Run security audit
        run: cargo audit
        continue-on-error: true
